name: Steam Idle Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Run Idle Script
        env:
          ACCOUNT_NAME: "main_account"
          USERNAME: ${{ secrets.STEAM_USERNAME }}
          PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          GAMES: ${{ secrets.STEAM_GAMES }}
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          STEAM_GAMES: ${{ secrets.STEAM_GAMES }}
        run: |
          mkdir -p configs
          echo "{\"username\":\"$STEAM_USERNAME\",\"password\":\"$STEAM_PASSWORD\",\"sharedSecret\":\"\",\"games\":[$STEAM_GAMES]}" > configs/main_account.json
          node index.js
